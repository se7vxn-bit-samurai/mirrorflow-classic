<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Cleaner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070A12;--card:rgba(255,255,255,.07);--accent:#7AB4FF;--al:rgba(122,180,255,.12);--ah:#5a9fff;--text:rgba(255,255,255,.92);--tm:rgba(255,255,255,.52);--bdr:rgba(255,255,255,.10);--hbg:#050810;--ht:rgba(255,255,255,.92);--r:14px;--sh:0 8px 32px rgba(0,0,0,.45);--sl:0 16px 48px rgba(0,0,0,.6);--early:#34D399;--mid:#7AB4FF;--late:#F472B6;--wknd:#FBBF24;--glow1:rgba(122,180,255,.18);--glow2:rgba(185,139,255,.14);--dot:rgba(255,255,255,.12);--card-border:rgba(255,255,255,.11);--card-top:rgba(255,255,255,.06)}
body,html{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 700px at 15% 10%,var(--glow1),transparent 60%),radial-gradient(700px 600px at 85% 20%,var(--glow2),transparent 60%),radial-gradient(800px 600px at 50% 100%,rgba(122,180,255,.07),transparent 60%)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55;background-image:radial-gradient(circle at 1px 1px,var(--dot) 0 1px,transparent 1.2px);background-size:28px 28px}
.app{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
.hd{background:rgba(97, 98, 102, 0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);color:var(--ht);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:100}
.hd-b{display:flex;align-items:center;gap:8px}.hd-l{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.hd h1{font-size:15px;font-weight:600}.hd-s{font-size:10px;opacity:.5}
.hd-a{display:flex;gap:5px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--ah)}
.bi{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,255,255,.06);border:none;color:var(--ht);cursor:pointer;font-size:13px}.bi:hover{background:rgba(255,255,255,.12)}
.uz{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.dz{width:100%;max-width:480px;border:2px dashed var(--bdr);border-radius:16px;padding:40px 30px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.dz:hover,.dz.dov{border-color:var(--accent);background:var(--al);transform:scale(1.01)}
.dz h2{font-size:18px;font-weight:600;margin:12px 0 6px}.dz p{color:var(--tm);font-size:12px;margin-bottom:14px}
.fb{display:flex;gap:5px;justify-content:center}.fm{background:var(--al);color:var(--accent);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;font-family:'JetBrains Mono',monospace}
.tb{display:flex;align-items:center;gap:5px;padding:7px 16px;background:var(--card);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.tg{display:flex;align-items:center;gap:3px}.tsp{width:1px;height:18px;background:var(--bdr);margin:0 3px}
.tb label{font-size:10px;color:var(--tm);font-weight:500}
.tb select,.tb input[type=text]{padding:4px 6px;border:1px solid var(--bdr);border-radius:4px;font-family:inherit;font-size:11px;background:var(--bg);color:var(--text)}
.tb input[type=text]{width:80px}
.mnav{display:flex;align-items:center;gap:2px}
.mnav button{width:22px;height:22px;border:1px solid var(--bdr);border-radius:4px;background:var(--card);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--text)}.mnav button:hover{background:var(--al)}
.mnav .mlbl{font-size:11px;font-weight:600;min-width:70px;text-align:center}
.ib{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--al);font-size:11px;border-bottom:1px solid var(--bdr);flex-wrap:wrap}.ib .l{font-weight:600;color:var(--accent)}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);padding:0 16px;overflow-x:auto}
.tab{padding:8px 12px;font-size:11px;font-weight:500;color:var(--tm);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;transition:all .1s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.a{color:var(--accent);border-bottom-color:var(--accent)}
.ct{flex:1;overflow-y:auto;padding:16px}.hid{display:none!important}

/* Calendar Dashboard - 3 panel layout */
.cal-dash{display:grid;grid-template-columns:260px 1fr 200px;gap:14px;min-height:400px}
@media(max-width:900px){.cal-dash{grid-template-columns:1fr;}}
.cal-left{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:12px;overflow:hidden}
.cal-mid{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px;overflow-y:auto;max-height:calc(100vh - 200px)}
.cal-right{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:12px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-head h3{font-size:13px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-dh{text-align:center;font-size:8px;font-weight:600;color:var(--tm);padding:3px 0;text-transform:uppercase}
.cal-d{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:all .1s;position:relative}
.cal-d:hover{background:var(--al);transform:scale(1.1)}
.cal-d.empty{cursor:default}.cal-d.work{background:#eef2ff;color:#4338ca}.cal-d.off{background:#f8fafc;color:#94a3b8}
.cal-d.today{outline:2px solid var(--accent);outline-offset:-1px}.cal-d.sel{background:var(--accent)!important;color:#fff!important}
.cal-d .cd-n{font-weight:700;font-size:11px;line-height:1}.cal-d .cd-dot{width:4px;height:4px;border-radius:50%;margin-top:1px}
.dot-work{background:#6366f1}.dot-off{background:#cbd5e1}.dot-mix{background:linear-gradient(90deg,#6366f1 50%,#cbd5e1 50%)}
/* Mid panel - roster list */
.roster-section h4{font-size:11px;font-weight:600;margin-bottom:8px;color:var(--text)}
.roster-date{font-size:15px;font-weight:700;margin-bottom:4px}
.roster-day{font-size:11px;color:var(--tm);margin-bottom:12px}
.roster-list{display:flex;flex-direction:column;gap:4px}
.roster-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;background:var(--al);transition:background .1s}
.roster-item:hover{background:var(--bdr)}
.roster-item .ri-name{font-weight:500;font-size:12px}.roster-item .ri-shift{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500}
.roster-item .ri-hrs{font-size:10px;color:var(--tm);margin-left:8px}
.roster-item.off-item{opacity:.4}
.roster-divider{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);font-weight:600;margin:8px 0 4px;padding-top:8px;border-top:1px solid var(--bdr)}
/* Right panel - summary */
.day-stat{text-align:center;padding:10px 0;border-bottom:1px solid var(--bdr)}
.day-stat:last-child{border-bottom:none}
.day-stat .ds-n{font-size:22px;font-weight:700;color:var(--accent)}.day-stat .ds-l{font-size:9px;color:var(--tm);margin-top:1px}
.shift-breakdown{margin-top:8px}
.sb-row{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid var(--bdr)}
.sb-row:last-child{border-bottom:none}

/* Cards — Magazine Editorial */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px}
.ec{background:var(--card);border-radius:14px;box-shadow:var(--sh);overflow:hidden;transition:transform .15s,box-shadow .15s;border:1px solid var(--card-border);box-shadow:var(--sh),inset 0 1px 0 var(--card-top);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:relative;z-index:1}
.ec:hover{box-shadow:var(--sl),inset 0 1px 0 var(--card-top)}
.ech{padding:16px 18px 0;cursor:pointer;user-select:none}
.ech-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.ech h3{font-size:20px;font-weight:700;letter-spacing:-.3px;line-height:1.2;color:var(--text)}
.ech .month-label{font-size:13px;font-weight:400;color:var(--tm)}
.ech .collapse-icon{font-size:11px;opacity:.3;transition:transform .2s;margin-left:6px}
.ech.collapsed .collapse-icon{transform:rotate(-90deg)}
.ech-meta{display:flex;gap:16px;align-items:center;margin-top:10px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.team-badge{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--al);color:var(--accent);font-weight:500}
.hrs-badge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent)}
.meta-pill{font-size:11px;color:var(--tm);display:flex;align-items:center;gap:4px}
.meta-pill strong{color:var(--text);font-weight:600}
/* Heatmap — editorial strip */
.heatmap{display:flex;gap:2px;padding:10px 18px 0;flex-wrap:wrap}
.hm-d{width:10px;height:10px;border-radius:3px;opacity:.85}
.hm-work{background:#6366f1}.hm-off{background:var(--bdr)}.hm-early{background:#059669}.hm-late{background:#dc2626}.hm-wknd{background:#d97706}
/* Card stats — understated */
.card-stats-row{display:flex;gap:20px;padding:10px 28px 0;font-size:11px;color:var(--tm);font-style:italic}
/* Card table — spacious */
.et{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.et th{padding:6px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--bdr);background:transparent}
.et td{padding:5px 14px;border-bottom:1px solid var(--bdr)}.et tr:hover td{background:var(--al)}
.et tr:last-child td{border-bottom:none}
.et tr.or td{color:var(--tm)}.et tr.wr .dc{color:var(--wknd)}
.et tr.today-row{background:var(--al);outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}
.ec-footer{padding:8px 18px 14px}
.sc{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}
.s-early{color:var(--early)}.s-mid{color:var(--mid)}.s-late{color:var(--late)}.s-wknd{color:var(--wknd)}.s-off{color:var(--tm);font-style:italic}
.wk-lbl{font-size:9px;color:var(--tm);opacity:.5;font-family:'JetBrains Mono',monospace}
.anom{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;background:#fef2f2;color:#dc2626;margin-right:6px;margin-bottom:4px}
.card-summary{padding:12px 18px 16px;display:flex;flex-direction:column;gap:10px}
.cs-heatmap{display:flex;gap:2px;flex-wrap:wrap}
.cs-type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.cs-type{background:var(--al);border-radius:6px;padding:6px 4px;text-align:center}
.cs-type .ct-n{font-size:18px;font-weight:700;color:var(--accent)}.cs-type .ct-l{font-size:9px;color:var(--tm);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}
.cs-type.ct-early .ct-n{color:var(--early)}.cs-type.ct-late .ct-n{color:var(--late)}.cs-type.ct-wknd .ct-n{color:var(--wknd)}.cs-type.ct-off .ct-n{color:var(--tm)}
.cs-stats{display:flex;gap:12px;font-size:10px;color:var(--tm);flex-wrap:wrap}
.cs-stats strong{color:var(--text)}
.ftw{overflow-x:auto;background:var(--card);border-radius:var(--r);box-shadow:var(--sh)}
.ft{width:100%;border-collapse:collapse;font-size:11px}
.ft th{background:var(--hbg);color:var(--ht);padding:7px 10px;text-align:left;font-weight:500;font-size:9px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;z-index:10}
.ft td{padding:5px 10px;border-bottom:1px solid var(--bdr)}.ft tr:hover td{background:var(--al)}
.ft td:first-child{position:sticky;left:0;background:var(--card);z-index:1;font-weight:500}
.ft tr:hover td:first-child{background:var(--al)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.scd{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);text-align:center}
.scd .n{font-size:24px;font-weight:700;color:var(--accent)}.scd .lb{font-size:10px;color:var(--tm);margin-top:2px}
.today-panel{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:16px;border-left:3px solid var(--accent)}
.today-panel h3{font-size:13px;font-weight:600;margin-bottom:8px}
.today-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px}
.today-item{padding:6px 10px;border-radius:6px;background:var(--al);display:flex;justify-content:space-between;align-items:center;font-size:11px}
.today-name{font-weight:500}.today-shift{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500}
/* Quick date range */
.qdr{display:flex;gap:3px;align-items:center}
.qdr button{padding:3px 8px;border:1px solid var(--bdr);border-radius:4px;background:var(--card);font-family:inherit;font-size:10px;cursor:pointer;color:var(--text)}.qdr button:hover{background:var(--al)}
.qdr button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Raw data tabs */
.raw-tabs{display:flex;gap:2px;margin-bottom:10px;overflow-x:auto}
.raw-tab{padding:5px 10px;border-radius:6px 6px 0 0;font-size:10px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--tm);border:1px solid var(--bdr);border-bottom:none}
.raw-tab.active{background:var(--card);color:var(--accent);font-weight:600}
.ew{position:relative}.em{position:absolute;top:100%;right:0;margin-top:3px;background:var(--card);border:1px solid var(--bdr);border-radius:7px;box-shadow:var(--sl);padding:3px;min-width:160px;z-index:200}
.srch-wrap{position:relative;display:flex;align-items:center}
.srch-inp{padding:4px 26px 4px 22px;border:1px solid var(--bdr);border-radius:4px;font-family:inherit;font-size:11px;background:var(--bg);color:var(--text);width:160px}
.srch-ico{position:absolute;left:6px;font-size:10px;opacity:.4;pointer-events:none}
.srch-clr{position:absolute;right:6px;cursor:pointer;font-size:10px;opacity:.4;line-height:1}
.srch-clr:hover{opacity:.9}
.srch-dd{position:absolute;top:calc(100% + 3px);left:0;width:220px;background:var(--hbg);border:1px solid var(--bdr);border-radius:8px;box-shadow:var(--sl);z-index:300;overflow:hidden;backdrop-filter:blur(16px)}
.srch-section{padding:4px 0}
.srch-label{padding:3px 10px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tm);opacity:.6}
.srch-item{padding:6px 10px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s}
.srch-item:hover,.srch-item.active{background:var(--al);color:var(--accent)}
.srch-item .si-tag{font-size:9px;opacity:.5;margin-left:auto}
.ei{display:flex;align-items:center;gap:5px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:11px;border:none;background:none;width:100%;font-family:inherit;color:var(--text)}.ei:hover{background:var(--al)}
.tp{display:flex;gap:3px}.td{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .1s}.td:hover{transform:scale(1.15)}.td.ac{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.kb-hint{position:fixed;bottom:12px;right:12px;background:var(--hbg);color:var(--ht);padding:4px 10px;border-radius:6px;font-size:9px;opacity:.4;pointer-events:none;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.kb-hint kbd{background:rgba(255,255,255,.12);padding:0px 4px;border-radius:2px;font-family:'JetBrains Mono',monospace}
.kb-hint .wm-inline{font-size:7.5px;opacity:.7;font-family:'JetBrains Mono',monospace;letter-spacing:.2px;color:var(--ht)}
.es-empty{text-align:center;padding:40px 16px;color:var(--tm)}.es-empty h3{font-size:15px;margin-bottom:5px;color:var(--text)}
@media(max-width:768px){.cg{grid-template-columns:1fr}.tb,.ct{padding:8px 12px}.hd{padding:8px 12px}.kb-hint{display:none}}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important;color:#111!important}
  body::before,body::after{display:none!important}
  .hd,.tb,.tabs,.ib,.kb-hint,.ew,.tp,.bi,.hd-a{display:none!important}
  .ct{padding:0}
  .ec{break-inside:avoid;background:#fff!important;border:1px solid #ddd!important;box-shadow:none!important;margin-bottom:16px;border-radius:8px;color:#111!important}
  .ech h3,.ech .month-label,.ech-meta{color:#111!important}
  .hrs-badge{color:#3b82f6!important}.meta-pill{color:#555!important}.meta-pill strong{color:#111!important}
  .et td,.et th{color:#111!important;border-color:#ddd!important;padding:5px 14px!important}
  .s-early{color:#059669!important}.s-mid{color:#3b82f6!important}.s-late{color:#dc2626!important}.s-wknd{color:#d97706!important}.s-off{color:#888!important}
  .dc{color:#111!important}.wr .dc{color:#d97706!important}.or td{color:#999!important}
  .print-page{page-break-after:always}.print-page:last-child{page-break-after:auto}
  .heatmap{padding:8px 14px 0}
  .hm-work{background:#6366f1!important}.hm-off{background:#ddd!important}.hm-early{background:#059669!important}.hm-late{background:#dc2626!important}.hm-wknd{background:#d97706!important}
  .wm-print{display:none!important}
}
.wm-print{display:none;position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:8px;color:#999;letter-spacing:.3px}
/* All-months layout */
.person-block{margin-bottom:28px}
.person-block-hd{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding:0 2px;display:flex;align-items:center;gap:8px}
.person-block-hd .pb-team{font-size:10px;color:var(--tm);font-weight:400}
.month-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px}
.month-row::-webkit-scrollbar{height:4px}.month-row::-webkit-scrollbar-track{background:transparent}.month-row::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.mc{background:var(--card);border:1px solid var(--card-border);border-radius:12px;box-shadow:var(--sh),inset 0 1px 0 var(--card-top);backdrop-filter:blur(12px);min-width:220px;max-width:220px;overflow:hidden;flex-shrink:0}
.mc.mc-full{min-width:320px;max-width:380px}
.mc-table{font-size:11px;width:100%;border-collapse:collapse}
.mc-table th{padding:5px 10px;text-align:left;font-size:9px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr)}
.mc-table td{padding:4px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.mc-table tr:hover td{background:var(--al)}
.mc-table tr.today-row{background:var(--al);outline:2px solid var(--accent);outline-offset:-1px}
.mc-table tr.or td{color:var(--tm)}
.mc-table .dc{color:var(--wknd)}
.mc-tbody-wrap{max-height:500px;overflow-y:auto}
.mc-tbody-wrap::-webkit-scrollbar{width:3px}.mc-tbody-wrap::-webkit-scrollbar-track{background:transparent}.mc-tbody-wrap::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.mc-hd{padding:10px 14px 8px;border-bottom:1px solid var(--bdr)}
.mc-month{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.mc-stats{display:flex;gap:8px;font-size:10px;color:var(--tm)}
.mc-stats strong{color:var(--accent)}
.mc-heatmap{display:flex;gap:2px;flex-wrap:wrap;padding:8px 14px 6px}
.mc-types{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:0 10px 8px}
.mc-type{background:var(--al);border-radius:5px;padding:5px 3px;text-align:center}
.mc-type .mt-n{font-size:15px;font-weight:700}.mc-type .mt-l{font-size:8px;color:var(--tm);text-transform:uppercase;letter-spacing:.3px}

const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],MOFULL=["January","February","March","April","May","June","July","August","September","October","November","December"],DOW=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DM={mon:"Monday",tue:"Tuesday",tues:"Tuesday",wed:"Wednesday",thu:"Thursday",thur:"Thursday",thurs:"Thursday",fri:"Friday",sat:"Saturday",sun:"Sunday"};
const TRE=/(\d{1,2})[:\.](\d{2})\s*(am|pm)?\s*[-–—]\s*(\d{1,2})[:\.](\d{2})\s*(am|pm)?/i,TMIL=/(\d{4})\s*[-–—]\s*(\d{4})/;
function X(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function P(n){return String(n).padStart(2,"0");}
function fD(d){return P(d.getDate())+"-"+MO[d.getMonth()];}
function fDF(d){return P(d.getDate())+" "+MO[d.getMonth()]+" "+d.getFullYear();}
function nD(v){if(!v)return null;const s=String(v).trim().toLowerCase().replace(/\./g,"");const f=DOW.find(d=>d.toLowerCase()===s);if(f)return f;if(DM[s])return DM[s];for(const[k,d]of Object.entries(DM)){if(s.startsWith(k))return d;}return null;}
function pDt(v){if(!v)return null;if(v instanceof Date&&!isNaN(v))return v;if(typeof v==="number"){const d=new Date((v-25569)*864e5);if(!isNaN(d))return d;}const s=String(v).trim();const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);const m2=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);if(m2){let y=+m2[3];if(y<100)y+=2000;return new Date(y,+m2[2]-1,+m2[1]);}const d=new Date(s);return isNaN(d)?null:d;}
function pTm(v){if(!v)return null;const s=String(v).trim();const m=s.match(TMIL);if(m)return{s:m[1].slice(0,2)+":"+m[1].slice(2),e:m[2].slice(0,2)+":"+m[2].slice(2)};const m2=s.match(TRE);if(m2){let sh=+m2[1],sm=+m2[2],sa=(m2[3]||"").toLowerCase(),eh=+m2[4],em=+m2[5],ea=(m2[6]||"").toLowerCase();if(sa==="pm"&&sh<12)sh+=12;if(sa==="am"&&sh===12)sh=0;if(ea==="pm"&&eh<12)eh+=12;if(ea==="am"&&eh===12)eh=0;return{s:P(sh)+":"+P(sm),e:P(eh)+":"+P(em)};}return null;}
function isOf(v){if(!v)return true;const s=String(v).trim();if(s===""||s==="·")return true;return/^(off|rest|leave|al|sick|ph|holiday|vacation|pto|absent|n\/a|rdo|day off)$/i.test(s);}
function isWk(v){return/^week\s*\d+$/i.test(String(v||"").trim());}
function getWk(v){const m=String(v||"").trim().match(/^week\s*(\d+)$/i);return m?m[1]:null;}
function isNs(v){const s=String(v||"").trim();if(!s||s==="·")return true;if(/^\d+(\.\d+)?$/.test(s)&&!s.includes("-")&&!s.includes(":"))return true;return false;}
function u2s(t,d){if(!t)return t;const dt=d||new Date(),y=dt.getFullYear(),ml=new Date(y,2,31),bs=new Date(y,2,31-ml.getDay(),1,0),ol=new Date(y,9,31),be=new Date(y,9,31-ol.getDay(),1,0),off=(dt>=bs&&dt<be)?1:2;const m=t.match(/^(\d{2}):(\d{2})$/);if(!m)return t;let h=+m[1]+off;if(h>=24)h-=24;return P(h)+":"+m[2];}
function calcHrs(s,e){if(!s||!e)return 0;const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);let h=(eh*60+em)-(sh*60+sm);if(h<0)h+=1440;return Math.round(h/60*100)/100;}
function isToday(d){if(!d)return false;const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function shiftType(e){
  if(e.isOff)return"off";

const SKIP=/^(team leader|all times|rsa roster)$/i;

function mkE(name,date,day,raw,team,weekLabel){
  const cs=String(raw||"").trim();

}

// ═══ PARSERS (unchanged logic, added week label tracking) ═══
function parseHoriz(data){
  const entries=[];if(!data||data.length<3)return entries;
  const sections=[];
  for(let i=0;i<data.length;i++){
    const row=data[i]||[];let dc=0;for(let j=1;j<Math.min(row.length,30);j++){if(nD(row[j]))dc++;}
    if(dc>=5){
      // Check: is the next row dates, or does THIS row's next row have dates merged with a name?
      const nextRow=data[i+1]||[];
      let dateSourceRow=i+1;let dateCols=[];
      // Standard: row i=days, row i+1=dates
      for(let j=1;j<nextRow.length;j++){const d=pDt(nextRow[j]);const day=nD(row[j]);if(d)dateCols.push({col:j,date:d,day:day||DOW[d.getDay()]});}
      
      if(dateCols.length>0){
        let team="Main";
        for(let k=Math.max(0,i-3);k<i;k++){const v=String((data[k]||[])[0]||"").trim();if(v&&v.toLowerCase()!=="·"&&!SKIP.test(v)&&!isWk(v)&&v.length>1){team=v;break;}}
        // Detect layout variant: check if dateRow has a name in col A (Learnership pattern)
        const dateRowName=String(nextRow[0]||"").trim();
        const hasNameInDateRow=dateRowName&&dateRowName.length>1&&!SKIP.test(dateRowName)&&!isWk(dateRowName)&&!dateRowName.toLowerCase().startsWith("all times");
        sections.push({dayRow:i,dateRow:dateSourceRow,dateCols,team,startData:hasNameInDateRow?dateSourceRow:dateSourceRow+1,nameInDateRow:hasNameInDateRow});
      }
    }
  }
  if(!sections.length){const r0=data[0]||[],r1=data[1]||[];const dateCols=[];for(let j=1;j<r1.length;j++){const d=pDt(r1[j]);const day=nD(r0[j]);if(d)dateCols.push({col:j,date:d,day:day||DOW[d.getDay()]});}if(dateCols.length>0)sections.push({dayRow:0,dateRow:1,dateCols,team:"Main",startData:2,nameInDateRow:false});}

  for(const sec of sections){
    const nextSec=sections.find(s=>s.dayRow>sec.dayRow);
    const endRow=nextSec?nextSec.dayRow-3:data.length;

    if(sec.nameInDateRow){
      // Learnership pattern: name row has name in A + dates in B+, shifts in the row below
      // Iterate in pairs: name row (with dates/week labels) + shift row
      for(let i=sec.startData;i<endRow-1;i+=2){
        const nameRow=data[i]||[];
        const shiftRow=data[i+1]||[];
        const nm=String(nameRow[0]||"").trim();
        if(!nm||SKIP.test(nm)||nm.toLowerCase().startsWith("all times")||nm==="·")continue;
        // Get week label from name row
        let weekLbl="";for(let j=1;j<Math.min(nameRow.length,30);j++){const wk=getWk(nameRow[j]);if(wk){weekLbl="W"+wk;break;}}
        // Find active range from shift row
        let firstCol=-1,lastCol=-1;
        for(const dc of sec.dateCols){
          const cs=String(shiftRow[dc.col]||"").trim();
          if(cs&&cs!=="·"&&!isWk(cs)&&!isNs(cs)){if(firstCol<0)firstCol=dc.col;lastCol=dc.col;}
        }
        for(const dc of sec.dateCols){
          const cv=shiftRow[dc.col];const cs=String(cv||"").trim();
          if(isWk(cs))continue;
          if(isNs(cs)){
            if(dc.col>=firstCol&&dc.col<=lastCol&&firstCol>=0)entries.push(mkE(nm,dc.date,dc.day,"OFF",sec.team,weekLbl));
            continue;
          }
          entries.push(mkE(nm,dc.date,dc.day,cv,sec.team,weekLbl));
        }
      }
    } else {
      // Standard pattern: name + shifts on same row
      for(let i=sec.startData;i<endRow;i++){
        const row=data[i]||[];const nm=String(row[0]||"").trim();
        if(!nm||SKIP.test(nm)||isWk(nm)||nm.toLowerCase().startsWith("all times")||nm==="·")continue;
        let weekLbl="";
        if(i+1<data.length){const nr=data[i+1]||[];for(let j=1;j<Math.min(nr.length,30);j++){const wk=getWk(nr[j]);if(wk){weekLbl="W"+wk;break;}}}
        let firstCol=-1,lastCol=-1;
        for(const dc of sec.dateCols){
          const cv=row[dc.col];const cs=String(cv||"").trim();
          if(cs&&cs!=="·"&&!isWk(cs)&&!isNs(cs)){if(firstCol<0)firstCol=dc.col;lastCol=dc.col;}
        }
        for(const dc of sec.dateCols){
          const cv=row[dc.col];const cs=String(cv||"").trim();
          if(isWk(cs))continue;
          if(isNs(cs)){
            if(dc.col>=firstCol&&dc.col<=lastCol&&firstCol>=0)entries.push(mkE(nm,dc.date,dc.day,"OFF",sec.team,weekLbl));
            continue;
          }
          entries.push(mkE(nm,dc.date,dc.day,cv,sec.team,weekLbl));
        }
        if(i+1<data.length&&isWk(String((data[i+1]||[])[1]||"")))i++;
      }
    }
  }
  return entries;
}

function parseVert(data){
  const entries=[];if(!data||data.length<2)return entries;
  const hdr=data[0]||[];const teams=[];let cur={name:"Main",cols:[]};let gap=0;
  for(let j=2;j<hdr.length;j++){
    const v=String(hdr[j]||"").trim();
    if(!v||v==="·"||v.toLowerCase().startsWith("all times")){gap++;if(gap>=2&&cur.cols.length>0){teams.push({...cur});cur={name:"Learnership",cols:[]};gap=0;}continue;}
    gap=0;if(!isWk(v)&&!SKIP.test(v))cur.cols.push({col:j,name:v});
  }
  if(cur.cols.length>0)teams.push(cur);
  for(const t of teams){if(t.cols.length>0){for(let j=Math.max(0,t.cols[0].col-3);j<t.cols[0].col;j++){if(String(hdr[j]||"").trim().toLowerCase()==="learnership")t.name="Learnership";}}}
  for(const team of teams){
    for(let i=1;i<data.length;i++){
      const row=data[i]||[];const day=nD(row[0]);if(!day)continue;
      let dateCol=1;if(team.cols.length>0){const fc=team.cols[0].col;if(fc>2){const dv=pDt(row[fc-1]);if(dv)dateCol=fc-1;}}
      const date=pDt(row[dateCol]);if(!date)continue;
      for(const nc of team.cols){
        const cv=row[nc.col];const cs=String(cv||"").trim();
        // Check adjacent col for week label
        let wk="";const adj=row[nc.col+1];if(adj&&isWk(String(adj))){const w=getWk(adj);if(w)wk="W"+w;}
        if(isWk(cs))continue;if(isNs(cs)&&!isOf(cs))continue;

}

function parseBlocks(data){
  const entries=[];if(!data||data.length<3)return entries;

  // ── PHASE 1: Build canonical name registry ──
  // Collect every name that appears in col A, trimmed. Track which names are "full"
  // (contain a space = first+last) vs "short" (single word = first name only).
  // Also track ID→name mappings, but flag IDs that map to multiple different names
  // (rotating IDs are common in messy rosters — these can't be trusted).
  const fullNames=[];  // names with spaces (e.g. "Sharon Moyo")
  const allNames=[];   // every unique trimmed name
  const idSeen={};     // id → Set of names seen with that ID
  data.forEach(r=>{
    if(!r)return;
    const nm=String(r[0]||"").trim();
    if(!nm||nm.length<2||SKIP.test(nm)||nm==="·")return;
    if(!allNames.includes(nm))allNames.push(nm);
    if(nm.includes(" ")&&!fullNames.includes(nm))fullNames.push(nm);
    const id=r[1];
    if(id&&typeof id==="number"){
      const k=String(id);
      if(!idSeen[k])idSeen[k]=new Set();
      idSeen[k].add(nm);
    }
  });
  // Build stable ID map: only trust IDs that consistently map to ONE name
  const stableIdMap={};
  for(const[k,names]of Object.entries(idSeen)){
    if(names.size===1)stableIdMap[k]=[...names][0];
    // If multiple names for same ID → unstable, skip entirely
  }

  // ── Normalize a name using prefix matching (primary) then stable IDs (fallback) ──
  function normName(nm,eid){
    // 1. If nm is already a full name, use it as-is
    if(fullNames.includes(nm))return nm;
    // 2. Prefix match: find the longest full name that starts with this short name
    //    e.g. "Sharon" → "Sharon Moyo", "Larissa" → "Larissa Brits"
    const pfx=fullNames.filter(f=>f.toLowerCase().startsWith(nm.toLowerCase())&&f.length>nm.length);
    if(pfx.length)return pfx.sort((a,b)=>b.length-a.length)[0];
    // 3. Stable ID lookup (only if prefix found nothing — IDs rotate in many files)
    if(eid&&typeof eid==="number"&&stableIdMap[String(eid)])return stableIdMap[String(eid)];
    // 4. Reverse prefix: check if any full name CONTAINS this name (handles middle-name cases)
    const rev=fullNames.filter(f=>f.toLowerCase().includes(nm.toLowerCase())&&f.length>nm.length);
    if(rev.length===1)return rev[0]; // only if unambiguous
    return nm;
  }

  // ── PHASE 2: Parse weekly blocks ──
  let i=0;
  while(i<data.length){
    const row=data[i]||[];
    // Detect day-header row: scan first 15 cols for day names
    const dayHits=[];
    for(let j=0;j<Math.min(row.length,15);j++){const d=nD(row[j]);if(d)dayHits.push({col:j,day:d});}

    if(dayHits.length>=5){
      // Find the FIRST contiguous group of 7 (Mon-Sun) — ignore overflow columns
      // "Contiguous" = no gap of 3+ empty columns between day hits
      const groups=[];let cur=[dayHits[0]];
      for(let k=1;k<dayHits.length;k++){
        if(dayHits[k].col-cur[cur.length-1].col<=2)cur.push(dayHits[k]);
        else{groups.push(cur);cur=[dayHits[k]];}
      }
      groups.push(cur);
      // Use only the first group (the actual schedule, not the rotation reference)
      const primary=groups[0];
      if(!primary||primary.length<5){i++;continue;}

      // Read date row
      i++;if(i>=data.length)break;
      const dr=data[i]||[];
      const dateCols=[];
      for(const dh of primary){
        const d=pDt(dr[dh.col]);
        dateCols.push({col:dh.col,date:d,day:dh.day});
      }
      // Sanity check: if dates span >14 days, something's wrong
      const validDates=dateCols.filter(d=>d.date).map(d=>d.date.getTime());
      if(validDates.length>=2){
        const span=(Math.max(...validDates)-Math.min(...validDates))/864e5;
        if(span>14){i++;continue;} // skip malformed block
      }

      // Read person rows until next day-header or end
      i++;
      while(i<data.length){
        const er=data[i]||[];
        // Check if this row is a new day-header
        let dc2=0;for(let j=0;j<Math.min(er.length,15);j++){if(nD(er[j]))dc2++;}
        if(dc2>=5)break;
        const nm=String(er[0]||"").trim();
        if(!nm||nm==="·"||SKIP.test(nm)){i++;continue;}
        const fn=normName(nm,er[1]);
        // Extract shifts for each date column
        for(const dc of dateCols){
          if(!dc.date)continue;
          const cv=er[dc.col];
          const cs=String(cv||"").trim();
          // Skip week labels and pure numeric noise, but allow OFF and empty
          if(isWk(cs))continue;
          if(isNs(cs)&&!isOf(cs)&&!pTm(cs))continue;
          entries.push(mkE(fn,dc.date,dc.day,cv,"Main",""));
        }

      continue;
    }

}

// ═══ PER-PERSON ALTERNATING ROWS PARSER ═══
// Pattern: alternating date-row / shift-row pairs. Name extracted from early rows.
// Rows 1-6 may have a compact summary (month+days / team leader+dates / name+shifts).
// Rows 8+ have weekly grid: optional month label, optional day-header, then date/shift pairs.
function parsePerson(data,sheetName){
  const entries=[];if(!data||data.length<4)return entries;
  // Extract person name from rows 1-6 (look for a non-label, non-date, non-day value in col A)
  let personName=sheetName; // fallback to sheet name
  for(let i=0;i<Math.min(6,data.length);i++){
    const v=String((data[i]||[])[0]||"").trim();
    if(v&&!SKIP.test(v)&&!nD(v)&&!pDt(v)&&v.length>1&&!/^(march|april|may|june|july|august|september|october|november|december|january|february)$/i.test(v)){
      personName=v;break;
    }
  }
  // Scan ALL rows for date-row / shift-row pairs
  // A date-row has 3+ parseable dates in cols B-H
  // A shift-row has 3+ time ranges or OFF values in cols B-H
  function classifyRow(row){
    if(!row)return"empty";
    let dates=0,shifts=0,days=0;
    for(let j=1;j<Math.min(row.length,32);j++){
      const v=row[j];
      if(pDt(v)&&!(typeof v==="number"&&v<100))dates++;
      const s=String(v||"").trim();
      if(pTm(s)||/^off$/i.test(s))shifts++;
      if(nD(s))days++;
    }
    if(dates>=3)return"date";
    if(shifts>=3)return"shift";
    if(days>=3)return"day";
    return"other";
  }

  // Also parse the top compact section (rows 1-6) which has full horizontal data
  // Row with "Team leader" + dates = date source, next row with name + shifts = shift source
  for(let i=0;i<Math.min(6,data.length);i++){
    const row=data[i]||[];
    if(classifyRow(row)==="date"){
      const shiftRow=data[i+1];
      if(shiftRow&&classifyRow(shiftRow)==="shift"){
        // Get day names from row above if available
        const dayRow=i>0?data[i-1]:null;
        for(let j=1;j<Math.min(row.length,60);j++){
          const dt=pDt(row[j]);
          if(!dt)continue;
          const sv=shiftRow[j];
          const day=dayRow?nD(dayRow[j]):null;
          entries.push(mkE(personName,dt,day||DOW[dt.getDay()],sv,"Main",""));
        }
        i++; // skip shift row
      }
    }
  }

  // Parse the weekly grid section (rows 7+)
  // Look for alternating date/shift pairs
  let i=7;
  while(i<data.length){
    const row=data[i]||[];
    const type=classifyRow(row);
    if(type==="date"){
      // Next row should be shifts
      const shiftRow=data[i+1];
      if(shiftRow&&classifyRow(shiftRow)==="shift"){
        // Get day names: check row above for day header, or calculate from date
        const dayRow=(i>0&&classifyRow(data[i-1])==="day")?data[i-1]:null;
        for(let j=1;j<Math.min(row.length,10);j++){
          const dt=pDt(row[j]);
          if(!dt)continue;
          const sv=shiftRow[j];
          const day=dayRow?nD(dayRow[j]):null;
          entries.push(mkE(personName,dt,day||DOW[dt.getDay()],sv,"Main",""));
        }
        i+=2;continue;
      }
    }
    i++;
  }

  // Deduplicate (top section and grid section may overlap)
  const seen={};const unique=[];
  entries.forEach(e=>{
    if(!e.date)return;
    const k=e.date.toISOString().split("T")[0];
    if(!seen[k]){seen[k]=true;unique.push(e);}
  });
  return unique;
}

function autoParse(data,sn){
  if(!data||data.length<2)return[];const s=sn.toLowerCase();
  if(s.includes("horizontal"))return parseHoriz(data);if(s.includes("vertic"))return parseVert(data);

  // Detect per-person alternating pattern
  let altScore=0;
  for(let i=7;i<Math.min(15,data.length);i++){
    const row=data[i]||[];let dates=0,shifts=0;
    for(let j=1;j<Math.min(row.length,10);j++){const v=row[j];if(pDt(v)&&!(typeof v==="number"&&v<100))dates++;const sv=String(v||"").trim();if(pTm(sv)||/^off$/i.test(sv))shifts++;}
    if(dates>=3||shifts>=3)altScore++;
  }
  let colAEmpty=0;
  for(let i=8;i<Math.min(20,data.length);i++){const v=String((data[i]||[])[0]||"").trim();if(!v||v==="·")colAEmpty++;}
  if(altScore>=4&&colAEmpty>=6)return parsePerson(data,sn);

  // Detect weekly blocks: look for REPEATING day-header rows (2+ occurrences = blocks)
  let dayHeaderRows=0;
  for(let i=0;i<Math.min(data.length,40);i++){
    const row=data[i]||[];let dc=0;
    for(let j=0;j<Math.min(row.length,12);j++){if(nD(row[j]))dc++;}
    if(dc>=5)dayHeaderRows++;
  }
  if(dayHeaderRows>=2)return parseBlocks(data);

  // Single day-header row = horizontal or vertical
  const r0=data[0]||[];let dc=0;for(let j=0;j<Math.min(r0.length,30);j++){if(nD(r0[j]))dc++;}
  if(dc>=5){const cAD=data.slice(1,20).filter(r=>nD((r||[])[0])).length;return cAD>=5?parseVert(data):parseHoriz(data);}

  // Fallback: try all and pick best
  const h=parseHoriz(data),v=parseVert(data),w=parseBlocks(data),p=parsePerson(data,sn);
  return[h,v,w,p].sort((a,b)=>b.length-a.length)[0];
}

function hFile(inp){const f=inp.files?.[0];if(f)proc(f);}
function proc(f){
  S.fn=f.name;const r=new FileReader();
  r.onload=function(e){
    try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});S.wb=wb;
    const all=wb.SheetNames;const ok=all.filter(s=>{const n=s.toLowerCase();return n!=="out time"&&!(n==="overview"&&all.some(x=>x.toLowerCase().includes("horizontal")||x.toLowerCase().includes("vertic")));});
    S.shs=ok.length?ok:all;S.sh="__all__";load(S.sh);showMV();}catch(e){console.error(e);alert("Could not parse file.");}
  };r.readAsArrayBuffer(f);
}
function load(sn){
  if(sn==="__all__"){
    S.raw=[];S.entries=[];const seen={};
    S.shs.forEach(shName=>{const ws=S.wb.Sheets[shName];const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});if(!S.raw.length)S.raw=data;
    autoParse(data,shName).forEach(e=>{const k=e.name+"|"+(e.date?e.date.getFullYear()+"-"+P(e.date.getMonth())+"-"+P(e.date.getDate()):"");if(!seen[k]){seen[k]=true;S.entries.push(e);}});});
  } else {const ws=S.wb.Sheets[sn];S.raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});S.entries=autoParse(S.raw,sn);}
  S.team="all";S.emp="all";S.shiftFilter="";S.calDay=null;S.rawSheet=sn==="__all__"?S.shs[0]:sn;
  const ms=new Set();S.entries.forEach(e=>{if(e.date)ms.add(e.date.getFullYear()+"-"+P(e.date.getMonth()));});
  S.months=[...ms].sort();S.mIdx=0;S.month=S.months[0]||null;
  // Auto-navigate to current month if available
  const now=new Date();const curKey=now.getFullYear()+"-"+P(now.getMonth());
  const ci=S.months.indexOf(curKey);if(ci>=0){S.mIdx=ci;S.month=curKey;}
  ren();
}
function swSh(sn){S.sh=sn;load(sn);}

/* ═══════════════════════════════════════════════════════════════
   DISPLAY HELPERS
   ═══════════════════════════════════════════════════════════════ */
function gD(){
  let e=S.entries;
  if(S.team!=="all")e=e.filter(x=>x.team===S.team);
  if(S.emp!=="all")e=e.filter(x=>x.name===S.emp);
  if(S.dayFilter)e=e.filter(x=>x.day&&x.day.toLowerCase()===S.dayFilter.toLowerCase());
  if(S.month){const[y,m]=S.month.split("-").map(Number);e=e.filter(x=>x.date&&x.date.getFullYear()===y&&x.date.getMonth()===m);}
  if(S.calDay&&S.tab==="calendar"){e=e.filter(x=>x.date&&x.date.getFullYear()===S.calDay.getFullYear()&&x.date.getMonth()===S.calDay.getMonth()&&x.date.getDate()===S.calDay.getDate());}
  if(S.shiftFilter){const sf=S.shiftFilter.toLowerCase();e=e.filter(x=>{const uk=(x.ukS||"")+"–"+(x.ukE||"");const sa=u2s(x.ukS,x.date)+"–"+u2s(x.ukE,x.date);return uk.includes(sf)||sa.includes(sf)||(x.isOff&&"off".includes(sf));});}
  return e.map(x=>(!S.tz||x.isOff||!x.ukS)?{...x,saS:null,saE:null}:{...x,saS:u2s(x.ukS,x.date),saE:u2s(x.ukE,x.date)});
}
function gE(){const m={};gD().forEach(e=>{if(!m[e.name])m[e.name]=[];m[e.name].push(e);});for(const k of Object.keys(m))m[k].sort((a,b)=>(a.date||0)-(b.date||0));return m;}
function gN(){return[...new Set(S.entries.filter(e=>S.team==="all"||e.team===S.team).map(e=>e.name))].sort();}
function gT(){return[...new Set(S.entries.map(e=>e.team))];}
function uD(e){if(e.isOff)return e.offL||"OFF";if(e.ukS)return e.ukS+"–"+e.ukE;return"—";}
function sAD(e){if(e.isOff)return e.offL||"OFF";if(e.saS)return e.saS+"–"+e.saE;if(e.ukS)return u2s(e.ukS,e.date)+"–"+u2s(e.ukE,e.date);return"—";}
function rCls(e){let c="";if(e.isOff)c+=" or";if(e.day==="Saturday"||e.day==="Sunday")c+=" wr";if(S.hlToday&&isToday(e.date))c+=" today-row";return c;}
function monthLabel(){if(!S.month)return"All";const[y,m]=S.month.split("-").map(Number);return MOFULL[m]+" "+y;}
function isToday(d){if(!d)return false;const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function $(id){return document.getElementById(id);}
function navM(dir){S.mIdx=Math.max(0,Math.min(S.months.length-1,S.mIdx+dir));S.month=S.months[S.mIdx]||null;S.calDay=null;ren();}

function findAnomalies(entries){
  const issues=[];if(!entries.length)return issues;
  const sorted=[...entries].filter(e=>e.date).sort((a,b)=>a.date-b.date);
  for(let i=1;i<sorted.length;i++){const diff=Math.round((sorted[i].date-sorted[i-1].date)/864e5);if(diff>1&&diff<8&&!sorted[i-1].isOff&&!sorted[i].isOff)issues.push({type:"gap",msg:`${diff-1}d gap: ${fD(sorted[i-1].date)}→${fD(sorted[i].date)}`});}
  const seen={};sorted.forEach(e=>{const k=e.date.toISOString().split("T")[0];if(seen[k])issues.push({type:"dup",msg:`Dup: ${fD(e.date)}`});seen[k]=true;});
  return issues;
}

function cardStats(entries){
  const work=entries.filter(e=>!e.isOff);
  const hrs=work.reduce((s,e)=>s+calcHrs(S.tz&&e.saS?e.saS:e.ukS,S.tz&&e.saE?e.saE:e.ukE),0);
  const avg=work.length?Math.round(hrs/work.length*10)/10:0;
  // Most common shift
  const shiftCounts={};work.forEach(e=>{const k=uD(e);shiftCounts[k]=(shiftCounts[k]||0)+1;});
  const topShift=Object.entries(shiftCounts).sort((a,b)=>b[1]-a[1])[0];
  // Max consecutive work days
  let maxCon=0,cur=0;
  entries.forEach(e=>{if(!e.isOff){cur++;if(cur>maxCon)maxCon=cur;}else cur=0;});
  return{hrs:Math.round(hrs),avg,topShift:topShift?topShift[0]:"—",maxCon};
}

/* ═══ CALENDAR ═══ */
function rCal(el){
  if(!S.month){el.innerHTML='<div class="es-empty"><p>No month selected</p></div>';return;}
  const[y,m]=S.month.split("-").map(Number);
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startPad=(first.getDay()+6)%7;
  let monthEntries=S.entries;
  if(S.team!=="all")monthEntries=monthEntries.filter(x=>x.team===S.team);
  const dateMap={};
  monthEntries.forEach(e=>{if(!e.date||e.date.getMonth()!==m||e.date.getFullYear()!==y)return;const d=e.date.getDate();if(!dateMap[d])dateMap[d]={work:0,off:0,entries:[]};if(e.isOff)dateMap[d].off++;else dateMap[d].work++;dateMap[d].entries.push(e);});
  // Default to today if in this month, else first day with data
  if(!S.calDay||S.calDay.getMonth()!==m||S.calDay.getFullYear()!==y){
    const now=new Date();
    if(now.getMonth()===m&&now.getFullYear()===y)S.calDay=new Date(y,m,now.getDate());
    else{const days=Object.keys(dateMap).map(Number).sort((a,b)=>a-b);S.calDay=days.length?new Date(y,m,days[0]):new Date(y,m,1);}
  }
  const selD=S.calDay?S.calDay.getDate():1;
  const selInfo=dateMap[selD]||{work:0,off:0,entries:[]};
  const selDate=S.calDay||new Date(y,m,1);

  // ─── LEFT: Mini Calendar ───
  let left=`<div class="cal-left"><div class="cal-head"><h3>${MOFULL[m]} ${y}</h3></div><div class="cal-grid">`;
  ["M","T","W","T","F","S","S"].forEach(d=>{left+=`<div class="cal-dh">${d}</div>`;});
  for(let i=0;i<startPad;i++)left+=`<div class="cal-d empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const info=dateMap[d];const dt=new Date(y,m,d);const isTod=isToday(dt);const isSel=selD===d;
    let cls="cal-d";if(!info)cls+=" empty";else if(info.work>0)cls+=" work";else cls+=" off";
    if(isTod)cls+=" today";if(isSel)cls+=" sel";
    let dot="";if(info){if(info.work>0&&info.off>0)dot='<div class="cd-dot dot-mix"></div>';else if(info.work>0)dot='<div class="cd-dot dot-work"></div>';else dot='<div class="cd-dot dot-off"></div>';}
    left+=`<div class="${cls}" onclick="pickDay(${y},${m},${d})"><span class="cd-n">${d}</span>${dot}</div>`;
  }
  left+=`</div></div>`;

  // ─── MID: Day Roster ───
  const working=selInfo.entries.filter(e=>!e.isOff).sort((a,b)=>((a.ukS||"99")>(b.ukS||"99")?1:-1));
  const offPpl=selInfo.entries.filter(e=>e.isOff);
  let mid=`<div class="cal-mid"><div class="roster-date">${selDate.getDate()} ${MO[selDate.getMonth()]} ${selDate.getFullYear()}</div>`;
  mid+=`<div class="roster-day">${DOW[selDate.getDay()]}${isToday(selDate)?" · <strong style='color:var(--accent)'>Today</strong>":""}</div>`;
  if(!selInfo.entries.length){mid+=`<p style="color:var(--tm);font-size:12px">No schedule data for this day.</p>`;}
  else{
    if(working.length){
      mid+=`<div class="roster-section"><h4>🟢 Working (${working.length})</h4><div class="roster-list">`;
      working.forEach(e=>{
        const uk=uD(e);const sa=S.tz?sAD(e):"";
        const hrs=calcHrs(S.tz&&e.saS?e.saS:e.ukS,S.tz&&e.saE?e.saE:e.ukE);
        const tag=e.team!=="Main"?` <span style="font-size:8px;opacity:.4">${X(e.team)}</span>`:"";
        mid+=`<div class="roster-item"><span class="ri-name">${X(e.name)}${tag}</span><span><span class="ri-shift ${shiftCls(e)}">${S.tz?X(sa):X(uk)}</span><span class="ri-hrs">${hrs.toFixed(1)}h</span></span></div>`;
      });
      mid+=`</div></div>`;
    }
    if(offPpl.length){
      mid+=`<div class="roster-divider">Off (${offPpl.length})</div><div class="roster-list">`;
      offPpl.forEach(e=>{
        const tag=e.team!=="Main"?` <span style="font-size:8px;opacity:.3">${X(e.team)}</span>`:"";
        mid+=`<div class="roster-item off-item"><span class="ri-name">${X(e.name)}${tag}</span><span class="ri-shift s-off">OFF</span></div>`;
      });
      mid+=`</div>`;
    }
  }
  mid+=`</div>`;

  // ─── RIGHT: Day Summary ───
  const totalHrs=working.reduce((s,e)=>s+calcHrs(S.tz&&e.saS?e.saS:e.ukS,S.tz&&e.saE?e.saE:e.ukE),0);
  let right=`<div class="cal-right">`;
  right+=`<div class="day-stat"><div class="ds-n">${working.length}</div><div class="ds-l">Working</div></div>`;
  right+=`<div class="day-stat"><div class="ds-n">${offPpl.length}</div><div class="ds-l">Off</div></div>`;
  right+=`<div class="day-stat"><div class="ds-n">${Math.round(totalHrs)}</div><div class="ds-l">Total Hours</div></div>`;
  right+=`<div class="day-stat"><div class="ds-n">${working.length?((totalHrs/working.length).toFixed(1)):0}</div><div class="ds-l">Avg Hrs/Person</div></div>`;
  // Shift breakdown
  if(working.length){
    const shifts={};working.forEach(e=>{const k=S.tz?sAD(e):uD(e);shifts[k]=(shifts[k]||0)+1;});
    right+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)"><div style="font-size:9px;font-weight:600;color:var(--tm);text-transform:uppercase;margin-bottom:4px">Shift Breakdown</div><div class="shift-breakdown">`;
    Object.entries(shifts).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
      right+=`<div class="sb-row"><span style="font-family:'JetBrains Mono',monospace">${X(k)}</span><span style="font-weight:600">${v}</span></div>`;
    });
    right+=`</div></div>`;
  }
  right+=`</div>`;

  el.innerHTML=`<div class="cal-dash">${left}${mid}${right}</div>`;
}

function srchKey(e,total){
  if(e.key==="Escape"){S.srch="";S.srchIdx=-1;ren();return;}
  if(e.key==="ArrowDown"){e.preventDefault();S.srchIdx=Math.min((S.srchIdx||0)+1,total-1);ren();document.getElementById('srchInp')?.focus();return;}
  if(e.key==="ArrowUp"){e.preventDefault();S.srchIdx=Math.max((S.srchIdx||-1)-1,-1);ren();document.getElementById('srchInp')?.focus();return;}
  if(e.key==="Enter"&&S.srchIdx>=0){
    // Figure out which result is selected
    const allNames=gN();
    const matchNames=S.srch?allNames.filter(n=>n.toLowerCase().includes(S.srch.toLowerCase())).slice(0,6):[];
    const matchDays=S.srch?DOW.filter(d=>d.toLowerCase().startsWith(S.srch.toLowerCase())).slice(0,3):[];
    const all=[...matchNames.map(n=>({type:"name",val:n})),...matchDays.map(d=>({type:"day",val:d}))];
    const sel=all[S.srchIdx];
    if(sel){if(sel.type==="name"){S.emp=sel.val;S.dayFilter="";}else{S.dayFilter=sel.val;S.emp="all";}S.srch="";S.srchIdx=-1;ren();}
  }
}

// ═══ CLEAN REFORMAT — outputs messy data in the clean per-person Claims format ═══
function expClean(){
  hExp();
  // Use ALL entries (ignore month filter) grouped by person
  let allEnt=S.entries.slice();
  if(S.team!=="all")allEnt=allEnt.filter(x=>x.team===S.team);
  if(S.emp!=="all")allEnt=allEnt.filter(x=>x.name===S.emp);
  allEnt=allEnt.map(x=>(!S.tz||x.isOff||!x.ukS)?{...x,saS:null,saE:null}:{...x,saS:u2s(x.ukS,x.date),saE:u2s(x.ukE,x.date)});

  const byName={};
  allEnt.forEach(e=>{if(!e.date)return;if(!byName[e.name])byName[e.name]=[];byName[e.name].push(e);});

  const wb=XLSX.utils.book_new();
  const DSHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Also build a CCS-style combined sheet
  const ccsRows=[];

  for(const[name,ent]of Object.entries(byName)){
    ent.sort((a,b)=>a.date-b.date);

    // Group by month
    const byMonth={};
    ent.forEach(e=>{const k=e.date.getFullYear()+"-"+P(e.date.getMonth());if(!byMonth[k])byMonth[k]=[];byMonth[k].push(e);});
    const mKeys=Object.keys(byMonth).sort();

    const rows=[];

    // ── Section 1: Compact horizontal summary (all dates in one row per month) ──
    for(const mk of mKeys){
      const mEnt=byMonth[mk];
      const[y,m]=mk.split("-").map(Number);
      // Row 1: Month name + day names
      const dayRow=[MOFULL[m]];mEnt.forEach(e=>dayRow.push(DSHORT[e.date.getDay()]));
      rows.push(dayRow);
      // Row 2: "Team leader" + dates
      const dateRow=["Team leader"];mEnt.forEach(e=>dateRow.push(e.date));
      rows.push(dateRow);
      // Row 3: Name + shifts
      const shiftRow=[name];
      mEnt.forEach(e=>{
        if(e.isOff)shiftRow.push("OFF");
        else if(S.tz&&e.saS)shiftRow.push(e.saS+" - "+e.saE);
        else if(e.ukS)shiftRow.push(e.ukS+" - "+e.ukE);
        else shiftRow.push("OFF");
      });
      rows.push(shiftRow);
    }

    // Blank separator
    rows.push([]);

    // ── Section 2: Weekly grid (Mon-Sun blocks with date/shift alternating rows) ──
    for(const mk of mKeys){
      const mEnt=byMonth[mk];
      const[y,m]=mk.split("-").map(Number);
      // Label
      rows.push([,name+" "+MOFULL[m]]);
      // Split into weeks (Mon-Sun)
      const weeks=[];let curWeek=[];
      mEnt.forEach(e=>{
        const dow=e.date.getDay(); // 0=Sun, 1=Mon
        // Start new week on Monday (or first entry)
        if(curWeek.length>0&&dow===1){weeks.push(curWeek);curWeek=[];}
        curWeek.push(e);
      });
      if(curWeek.length)weeks.push(curWeek);

      // Day header row (only once per month)
      rows.push([,"Mon","Tue","Wed","Thu","Fri","Sat","Sun"]);

      for(const week of weeks){
        // Build a 7-slot array (Mon=0 to Sun=6)
        const slots=new Array(7).fill(null);
        week.forEach(e=>{
          let idx=(e.date.getDay()+6)%7; // Mon=0, Tue=1... Sun=6
          slots[idx]=e;
        });
        // Date row
        const dRow=[undefined]; // col A empty
        for(let d=0;d<7;d++)dRow.push(slots[d]?slots[d].date:undefined);
        rows.push(dRow);
        // Shift row
        const sRow=[undefined];
        for(let d=0;d<7;d++){
          const e=slots[d];
          if(!e)sRow.push(undefined);
          else if(e.isOff)sRow.push("OFF");
          else if(S.tz&&e.saS)sRow.push(e.saS+" - "+e.saE);
          else if(e.ukS)sRow.push(e.ukS+" - "+e.ukE);
          else sRow.push("OFF");
        }
        rows.push(sRow);
      }
      rows.push([]); // gap between months
    }

    // Create person sheet
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Set date format for date cells
    const range=XLSX.utils.decode_range(ws["!ref"]||"A1");
    for(let R=range.s.r;R<=range.e.r;R++){
      for(let C=range.s.c;C<=range.e.c;C++){
        const addr=XLSX.utils.encode_cell({r:R,c:C});
        const cell=ws[addr];
        if(cell&&cell.t==="d"){cell.z="DD/MM/YYYY";}
      }
    }
    // Column widths
    ws["!cols"]=[{wch:18},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
    const sheetName=name.replace(/[\\\/\?\*\[\]:]/g,"_").substring(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sheetName);

    // ── Also build CCS combined block for this person's months ──
    for(const mk of mKeys){
      const mEnt=byMonth[mk];
      // Group into weeks
      const weeks=[];let cw=[];
      mEnt.forEach(e=>{const dow=e.date.getDay();if(cw.length>0&&dow===1){weeks.push(cw);cw=[];}cw.push(e);});
      if(cw.length)weeks.push(cw);
      for(const week of weeks){
        // Check if this week's day/date header already exists in ccsRows
        const firstDate=week[0].date;
        const wkMon=new Date(firstDate);wkMon.setDate(wkMon.getDate()-((wkMon.getDay()+6)%7));
        const wkKey=wkMon.toISOString().split("T")[0];
        let blockIdx=ccsRows.findIndex(r=>r._wkKey===wkKey);
        if(blockIdx<0){
          // Create new block: day header + date header
          const dayHdr={_wkKey:wkKey,_type:"dayHdr",cells:["","Mon","Tue","Wed","Thu","Fri","Sat","Sun"]};
          const dateHdr={_wkKey:wkKey,_type:"dateHdr",cells:["Team leader"]};
          const slots=new Array(7).fill(null);
          week.forEach(e=>{slots[(e.date.getDay()+6)%7]=e.date;});
          for(let d=0;d<7;d++)dateHdr.cells.push(slots[d]||undefined);
          ccsRows.push(dayHdr);ccsRows.push(dateHdr);
          blockIdx=ccsRows.length-2;
        }
        // Add person row for this week
        const pRow={_wkKey:wkKey,_type:"person",_name:name,cells:[name]};
        const slots=new Array(7).fill(null);
        week.forEach(e=>{slots[(e.date.getDay()+6)%7]=e;});
        for(let d=0;d<7;d++){
          const e=slots[d];
          if(!e)pRow.cells.push("");
          else if(e.isOff)pRow.cells.push("OFF");
          else if(S.tz&&e.saS)pRow.cells.push(e.saS+" - "+e.saE);
          else if(e.ukS)pRow.cells.push(e.ukS+" - "+e.ukE);
          else pRow.cells.push("OFF");
        }
        // Insert after the last row of this block
        let insertAt=blockIdx+2;
        while(insertAt<ccsRows.length&&ccsRows[insertAt]._wkKey===wkKey)insertAt++;
        ccsRows.splice(insertAt,0,pRow);
      }
    }
  }

  // Build the CCS combined sheet
  const ccsAoa=[];
  let lastKey="";
  for(const r of ccsRows){
    if(r._wkKey!==lastKey&&lastKey)ccsAoa.push([]); // blank between blocks
    lastKey=r._wkKey;
    ccsAoa.push(r.cells);
  }
  if(ccsAoa.length){
    const ccsWs=XLSX.utils.aoa_to_sheet(ccsAoa);
    ccsWs["!cols"]=[{wch:20},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14}];
    // Set date format
    const range=XLSX.utils.decode_range(ccsWs["!ref"]||"A1");
    for(let R=range.s.r;R<=range.e.r;R++){
      for(let C=range.s.c;C<=range.e.c;C++){
        const addr=XLSX.utils.encode_cell({r:R,c:C});
        const cell=ccsWs[addr];
        if(cell&&cell.t==="d"){cell.z="DD/MM/YYYY";}
      }
    }
    XLSX.utils.book_append_sheet(wb,ccsWs,"CCS");
  }

  const fn=S.fn?S.fn.replace(/\.[^.]+$/,""):"schedule";
  XLSX.writeFile(wb,`${fn}_CLEAN.xlsx`);
}

document.addEventListener("keydown",e=>{
  if(!S.wb||e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
  if(e.key==="ArrowLeft"){e.preventDefault();navM(-1);}
  if(e.key==="ArrowRight"){e.preventDefault();navM(1);}
  if(e.key==="ArrowUp"||e.key==="ArrowDown"){e.preventDefault();const ns=gN();if(!ns.length)return;let idx=ns.indexOf(S.emp);if(e.key==="ArrowUp")idx=idx<=0?ns.length-1:idx-1;else idx=idx>=ns.length-1?0:idx+1;S.emp=ns[idx];ren();}
  if(e.key.toLowerCase()==="t"){const now=new Date();const ck=now.getFullYear()+"-"+P(now.getMonth());const ci=S.months.indexOf(ck);if(ci>=0){S.mIdx=ci;S.month=ck;S.calDay=new Date(now.getFullYear(),now.getMonth(),now.getDate());}S.tab="calendar";ren();}

});
